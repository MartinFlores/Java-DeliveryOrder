<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="app-icon" href="/assets/icon-192.png" />
    <link rel="manifest" id="app-manifest" href="/manifest-admin.json" />
    <title id="app-title">ADMIN</title>
    <script>
      (function () {
        var isCashier = location.search.includes('cashier');
        if (isCashier) {
          document.getElementById('app-manifest').href = '/manifest-cashier.json';
          document.getElementById('app-icon').href = '/assets/icon-cashier-192.png';
          document.getElementById('app-title').textContent = 'CAJERO';
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DeliveryOrder" />
  </head>
  <body>
    <div id="app" class="w-screen h-screen overflow-hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
